<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750">
  <defs>
    <style>
      .font-ui { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .font-mono { font-family: 'SF Mono', 'Consolas', monospace; }
    </style>
  </defs>

  <!-- Window -->
  <rect width="1200" height="750" rx="10" fill="#1a1a2e"/>
  <circle cx="20" cy="16" r="6" fill="#ff5555" opacity="0.8"/>
  <circle cx="40" cy="16" r="6" fill="#f1fa8c" opacity="0.8"/>
  <circle cx="60" cy="16" r="6" fill="#50fa7b" opacity="0.8"/>

  <!-- Title Bar -->
  <rect x="0" y="0" width="1200" height="38" rx="10" fill="#1a1a2e"/>
  <rect x="0" y="20" width="1200" height="18" fill="#1a1a2e"/>
  <line x1="0" y1="38" x2="1200" y2="38" stroke="#2d2d50" stroke-width="1"/>
  <text x="90" y="24" class="font-ui" fill="#6c63ff" font-size="16">🍋</text>
  <text x="110" y="24" class="font-ui" fill="#8888aa" font-size="12" font-weight="600">Citrus Editor</text>

  <!-- Sidebar -->
  <rect x="0" y="38" width="240" height="688" fill="#1e1e32"/>
  <line x1="240" y1="38" x2="240" y2="750" stroke="#2d2d50" stroke-width="1"/>

  <!-- Tab Bar + Editor (dimmed) -->
  <rect x="240" y="38" width="960" height="688" fill="#252540" opacity="0.4"/>

  <!-- Dark overlay for modal -->
  <rect x="0" y="38" width="1200" height="688" fill="#000000" opacity="0.45"/>

  <!-- Command Palette Modal -->
  <rect x="350" y="140" width="500" height="380" rx="12" fill="#1e1e32"/>
  <rect x="350" y="140" width="500" height="380" rx="12" fill="none" stroke="#2d2d50" stroke-width="1"/>
  <!-- Shadow -->
  <rect x="354" y="144" width="500" height="380" rx="12" fill="#000000" opacity="0.3"/>
  <rect x="350" y="140" width="500" height="380" rx="12" fill="#1e1e32"/>
  <rect x="350" y="140" width="500" height="380" rx="12" fill="none" stroke="#2d2d50" stroke-width="1"/>

  <!-- Search input -->
  <rect x="366" y="156" width="468" height="36" rx="6" fill="#252540"/>
  <rect x="366" y="156" width="468" height="36" rx="6" fill="none" stroke="#6c63ff" stroke-width="1.5"/>
  <text x="382" y="178" class="font-ui" fill="#5e5e80" font-size="13">コマンドを検索...</text>

  <!-- Command list -->
  <!-- Hovered item -->
  <rect x="366" y="204" width="468" height="36" rx="4" fill="#6c63ff" opacity="0.15"/>
  <text x="382" y="226" class="font-ui" fill="#c8c8e0" font-size="13">New File</text>
  <text x="818" y="226" class="font-mono" fill="#5e5e80" font-size="11" text-anchor="end">⌘ N</text>

  <text x="382" y="262" class="font-ui" fill="#c8c8e0" font-size="13">Toggle Sidebar</text>
  <text x="818" y="262" class="font-mono" fill="#5e5e80" font-size="11" text-anchor="end">⌘ \</text>

  <text x="382" y="298" class="font-ui" fill="#c8c8e0" font-size="13">Save File</text>
  <text x="818" y="298" class="font-mono" fill="#5e5e80" font-size="11" text-anchor="end">⌘ S</text>

  <text x="382" y="334" class="font-ui" fill="#c8c8e0" font-size="13">Insert Date Header</text>
  <text x="818" y="334" class="font-mono" fill="#5e5e80" font-size="11" text-anchor="end">⌘ ⇧ L</text>

  <text x="382" y="370" class="font-ui" fill="#c8c8e0" font-size="13">Toggle AI Assistant</text>
  <text x="818" y="370" class="font-mono" fill="#5e5e80" font-size="11" text-anchor="end">⌘ /</text>

  <text x="382" y="406" class="font-ui" fill="#c8c8e0" font-size="13">Voice to New Document</text>

  <text x="382" y="442" class="font-ui" fill="#c8c8e0" font-size="13">Start/Stop Voice Input</text>

  <!-- Divider lines -->
  <line x1="366" y1="240" x2="834" y2="240" stroke="#2d2d50" stroke-width="0.5" opacity="0.5"/>
  <line x1="366" y1="276" x2="834" y2="276" stroke="#2d2d50" stroke-width="0.5" opacity="0.5"/>
  <line x1="366" y1="312" x2="834" y2="312" stroke="#2d2d50" stroke-width="0.5" opacity="0.5"/>
  <line x1="366" y1="348" x2="834" y2="348" stroke="#2d2d50" stroke-width="0.5" opacity="0.5"/>
  <line x1="366" y1="384" x2="834" y2="384" stroke="#2d2d50" stroke-width="0.5" opacity="0.5"/>
  <line x1="366" y1="420" x2="834" y2="420" stroke="#2d2d50" stroke-width="0.5" opacity="0.5"/>
  <line x1="366" y1="456" x2="834" y2="456" stroke="#2d2d50" stroke-width="0.5" opacity="0.5"/>

  <!-- Status Bar -->
  <rect x="0" y="726" width="1200" height="24" fill="#1a1a2e"/>
  <line x1="0" y1="726" x2="1200" y2="726" stroke="#2d2d50" stroke-width="1"/>

  <!-- Window border -->
  <rect width="1200" height="750" rx="10" fill="none" stroke="#2d2d50" stroke-width="1"/>
</svg>