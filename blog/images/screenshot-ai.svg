<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750">
  <defs>
    <style>
      .font-ui { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .font-mono { font-family: 'SF Mono', 'Consolas', monospace; }
    </style>
  </defs>

  <!-- Window -->
  <rect width="1200" height="750" rx="10" fill="#1a1a2e"/>
  <!-- Window dots -->
  <circle cx="20" cy="16" r="6" fill="#ff5555" opacity="0.8"/>
  <circle cx="40" cy="16" r="6" fill="#f1fa8c" opacity="0.8"/>
  <circle cx="60" cy="16" r="6" fill="#50fa7b" opacity="0.8"/>

  <!-- Title Bar -->
  <rect x="0" y="0" width="1200" height="38" rx="10" fill="#1a1a2e"/>
  <rect x="0" y="20" width="1200" height="18" fill="#1a1a2e"/>
  <line x1="0" y1="38" x2="1200" y2="38" stroke="#2d2d50" stroke-width="1"/>
  <text x="90" y="24" class="font-ui" fill="#6c63ff" font-size="16">🍋</text>
  <text x="110" y="24" class="font-ui" fill="#8888aa" font-size="12" font-weight="600" letter-spacing="0.5">Citrus Editor</text>
  <text x="500" y="24" class="font-ui" fill="#8888aa" font-size="12" text-anchor="middle">app.js</text>

  <!-- Sidebar (collapsed indicator) -->
  <rect x="0" y="38" width="240" height="688" fill="#1e1e32"/>
  <line x1="240" y1="38" x2="240" y2="750" stroke="#2d2d50" stroke-width="1"/>
  <text x="16" y="62" class="font-ui" fill="#5e5e80" font-size="11" font-weight="700" letter-spacing="1.5">DOCUMENTS</text>
  <text x="216" y="62" class="font-ui" fill="#8888aa" font-size="16" text-anchor="end">+</text>

  <!-- File tree -->
  <text x="20" y="92" class="font-mono" fill="#ffb86c" font-size="11">¶</text>
  <text x="38" y="92" class="font-ui" fill="#c8c8e0" font-size="12">meeting-notes.md</text>

  <rect x="4" y="100" width="232" height="30" rx="4" fill="#3a3a65"/>
  <text x="20" y="120" class="font-mono" fill="#f1fa8c" font-size="11">JS</text>
  <text x="38" y="120" class="font-ui" fill="#c8c8e0" font-size="12">app.js</text>

  <text x="20" y="148" class="font-mono" fill="#8be9fd" font-size="11">TS</text>
  <text x="38" y="148" class="font-ui" fill="#c8c8e0" font-size="12">utils.ts</text>

  <!-- Tab Bar -->
  <rect x="240" y="38" width="960" height="36" fill="#1a1a2e"/>
  <line x1="240" y1="74" x2="1200" y2="74" stroke="#2d2d50" stroke-width="1"/>
  <rect x="240" y="38" width="120" height="36" fill="#252540"/>
  <line x1="240" y1="74" x2="360" y2="74" stroke="#6c63ff" stroke-width="2"/>
  <text x="260" y="60" class="font-mono" fill="#f1fa8c" font-size="10">JS</text>
  <text x="276" y="60" class="font-ui" fill="#c8c8e0" font-size="12">app.js</text>
  <text x="348" y="60" class="font-ui" fill="#5e5e80" font-size="12">×</text>

  <!-- Editor area (narrower because AI panel is open) -->
  <rect x="240" y="74" width="580" height="652" fill="#252540"/>

  <!-- Line numbers -->
  <rect x="240" y="74" width="48" height="652" fill="#1e1e32" opacity="0.5"/>
  <text x="278" y="98" class="font-mono" fill="#5e5e80" font-size="13" text-anchor="end">1</text>
  <text x="278" y="118" class="font-mono" fill="#5e5e80" font-size="13" text-anchor="end">2</text>
  <text x="278" y="138" class="font-mono" fill="#5e5e80" font-size="13" text-anchor="end">3</text>
  <text x="278" y="158" class="font-mono" fill="#5e5e80" font-size="13" text-anchor="end">4</text>
  <text x="278" y="178" class="font-mono" fill="#5e5e80" font-size="13" text-anchor="end">5</text>
  <text x="278" y="198" class="font-mono" fill="#5e5e80" font-size="13" text-anchor="end">6</text>
  <text x="278" y="218" class="font-mono" fill="#5e5e80" font-size="13" text-anchor="end">7</text>
  <text x="278" y="238" class="font-mono" fill="#5e5e80" font-size="13" text-anchor="end">8</text>
  <text x="278" y="258" class="font-mono" fill="#5e5e80" font-size="13" text-anchor="end">9</text>
  <text x="278" y="278" class="font-mono" fill="#5e5e80" font-size="13" text-anchor="end">10</text>

  <!-- Code content -->
  <text x="296" y="98" class="font-mono" fill="#ff79c6" font-size="13">const</text>
  <text x="340" y="98" class="font-mono" fill="#50fa7b" font-size="13">express</text>
  <text x="400" y="98" class="font-mono" fill="#c8c8e0" font-size="13">=</text>
  <text x="414" y="98" class="font-mono" fill="#8be9fd" font-size="13">require</text>
  <text x="472" y="98" class="font-mono" fill="#c8c8e0" font-size="13">(</text>
  <text x="480" y="98" class="font-mono" fill="#f1fa8c" font-size="13">'express'</text>
  <text x="554" y="98" class="font-mono" fill="#c8c8e0" font-size="13">);</text>

  <text x="296" y="118" class="font-mono" fill="#ff79c6" font-size="13">const</text>
  <text x="340" y="118" class="font-mono" fill="#50fa7b" font-size="13">app</text>
  <text x="364" y="118" class="font-mono" fill="#c8c8e0" font-size="13">=</text>
  <text x="378" y="118" class="font-mono" fill="#8be9fd" font-size="13">express</text>
  <text x="436" y="118" class="font-mono" fill="#c8c8e0" font-size="13">();</text>

  <text x="296" y="158" class="font-mono" fill="#8888aa" font-size="13">// Middleware</text>
  <text x="296" y="178" class="font-mono" fill="#c8c8e0" font-size="13">app.use(express.json());</text>

  <text x="296" y="218" class="font-mono" fill="#8888aa" font-size="13">// Routes</text>
  <text x="296" y="238" class="font-mono" fill="#c8c8e0" font-size="13">app.get(</text>
  <text x="358" y="238" class="font-mono" fill="#f1fa8c" font-size="13">'/'</text>
  <text x="376" y="238" class="font-mono" fill="#c8c8e0" font-size="13">, (req, res) =&gt; {</text>
  <text x="316" y="258" class="font-mono" fill="#c8c8e0" font-size="13">res.send(</text>
  <text x="388" y="258" class="font-mono" fill="#f1fa8c" font-size="13">'Hello World'</text>
  <text x="490" y="258" class="font-mono" fill="#c8c8e0" font-size="13">);</text>
  <text x="296" y="278" class="font-mono" fill="#c8c8e0" font-size="13">});</text>

  <!-- AI Panel -->
  <rect x="820" y="74" width="380" height="652" fill="#1e1e32"/>
  <line x1="820" y1="74" x2="820" y2="726" stroke="#2d2d50" stroke-width="1"/>

  <!-- AI Panel Header -->
  <rect x="820" y="74" width="380" height="40" fill="#1a1a2e"/>
  <line x1="820" y1="114" x2="1200" y2="114" stroke="#2d2d50" stroke-width="1"/>
  <text x="840" y="99" class="font-ui" fill="#c8c8e0" font-size="13" font-weight="600">AI Assistant</text>
  <text x="1176" y="99" class="font-ui" fill="#8888aa" font-size="16">×</text>

  <!-- User message -->
  <rect x="880" y="130" width="296" height="40" rx="8" fill="#6c63ff" opacity="0.15"/>
  <rect x="880" y="130" width="296" height="40" rx="8" fill="none" stroke="#6c63ff" stroke-width="1" opacity="0.3"/>
  <text x="896" y="150" class="font-ui" fill="#c8c8e0" font-size="12">このコードにエラーハンドリングを</text>
  <text x="896" y="164" class="font-ui" fill="#c8c8e0" font-size="12">追加するにはどうすればいいですか？</text>

  <!-- AI response -->
  <rect x="840" y="186" width="336" height="280" rx="8" fill="#252540"/>
  <text x="856" y="208" class="font-ui" fill="#c8c8e0" font-size="12">エラーハンドリングを追加するには、</text>
  <text x="856" y="224" class="font-ui" fill="#c8c8e0" font-size="12">以下のようにミドルウェアを使います：</text>

  <!-- Code block in AI response -->
  <rect x="856" y="240" width="304" height="130" rx="6" fill="#1a1a2e"/>
  <rect x="856" y="240" width="304" height="24" rx="6" fill="#1a1a2e"/>
  <rect x="856" y="258" width="304" height="6" fill="#1a1a2e"/>
  <!-- Copy button -->
  <rect x="1104" y="244" width="44" height="18" rx="4" fill="#2d2d50"/>
  <text x="1126" y="256" class="font-ui" fill="#8888aa" font-size="10" text-anchor="middle">Copy</text>

  <text x="868" y="278" class="font-mono" fill="#c8c8e0" font-size="11">app.use((err, req, res, next)</text>
  <text x="868" y="294" class="font-mono" fill="#c8c8e0" font-size="11">  =&gt; {</text>
  <text x="868" y="310" class="font-mono" fill="#c8c8e0" font-size="11">  console.error(err.stack);</text>
  <text x="868" y="326" class="font-mono" fill="#c8c8e0" font-size="11">  res.status(500).send(</text>
  <text x="868" y="342" class="font-mono" fill="#f1fa8c" font-size="11">    'Server Error'</text>
  <text x="868" y="358" class="font-mono" fill="#c8c8e0" font-size="11">  );</text>

  <text x="856" y="392" class="font-ui" fill="#c8c8e0" font-size="12">これをルート定義の後に追加してください。</text>
  <text x="856" y="410" class="font-ui" fill="#c8c8e0" font-size="12">try-catchでルートを囲むことも</text>
  <text x="856" y="428" class="font-ui" fill="#c8c8e0" font-size="12">おすすめです。</text>

  <!-- AI Input area -->
  <rect x="836" y="680" width="348" height="36" rx="8" fill="#252540"/>
  <rect x="836" y="680" width="348" height="36" rx="8" fill="none" stroke="#2d2d50" stroke-width="1"/>
  <text x="856" y="702" class="font-ui" fill="#5e5e80" font-size="12">メッセージを入力...</text>
  <!-- Mic icon -->
  <circle cx="1160" cy="698" r="12" fill="#2d2d50"/>
  <text x="1160" y="703" class="font-ui" fill="#8888aa" font-size="12" text-anchor="middle">🎤</text>

  <!-- Status Bar -->
  <rect x="0" y="726" width="1200" height="24" fill="#1a1a2e"/>
  <line x1="0" y1="726" x2="1200" y2="726" stroke="#2d2d50" stroke-width="1"/>
  <text x="1000" y="742" class="font-ui" fill="#8888aa" font-size="11">Ln 8, Col 1</text>
  <text x="1060" y="742" class="font-ui" fill="#8888aa" font-size="11">UTF-8</text>
  <text x="1110" y="742" class="font-ui" fill="#8888aa" font-size="11">JavaScript</text>

  <!-- Window border -->
  <rect width="1200" height="750" rx="10" fill="none" stroke="#2d2d50" stroke-width="1"/>
</svg>