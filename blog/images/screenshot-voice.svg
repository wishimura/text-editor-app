<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750">
  <defs>
    <style>
      .font-ui { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .font-mono { font-family: 'SF Mono', 'Consolas', monospace; }
    </style>
    <!-- Pulse animation for recording -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Window -->
  <rect width="1200" height="750" rx="10" fill="#1a1a2e"/>
  <circle cx="20" cy="16" r="6" fill="#ff5555" opacity="0.8"/>
  <circle cx="40" cy="16" r="6" fill="#f1fa8c" opacity="0.8"/>
  <circle cx="60" cy="16" r="6" fill="#50fa7b" opacity="0.8"/>

  <!-- Title Bar -->
  <rect x="0" y="0" width="1200" height="38" rx="10" fill="#1a1a2e"/>
  <rect x="0" y="20" width="1200" height="18" fill="#1a1a2e"/>
  <line x1="0" y1="38" x2="1200" y2="38" stroke="#2d2d50" stroke-width="1"/>
  <text x="90" y="24" class="font-ui" fill="#6c63ff" font-size="16">🍋</text>
  <text x="110" y="24" class="font-ui" fill="#8888aa" font-size="12" font-weight="600" letter-spacing="0.5">Citrus Editor</text>
  <text x="600" y="24" class="font-ui" fill="#8888aa" font-size="12" text-anchor="middle">meeting-notes.md</text>

  <!-- Sidebar -->
  <rect x="0" y="38" width="240" height="688" fill="#1e1e32"/>
  <line x1="240" y1="38" x2="240" y2="750" stroke="#2d2d50" stroke-width="1"/>
  <text x="16" y="62" class="font-ui" fill="#5e5e80" font-size="11" font-weight="700" letter-spacing="1.5">DOCUMENTS</text>
  <text x="216" y="62" class="font-ui" fill="#8888aa" font-size="16" text-anchor="end">+</text>

  <rect x="4" y="72" width="232" height="30" rx="4" fill="#3a3a65"/>
  <text x="20" y="92" class="font-mono" fill="#ffb86c" font-size="11">¶</text>
  <text x="38" y="92" class="font-ui" fill="#c8c8e0" font-size="12">meeting-notes.md</text>
  <text x="20" y="120" class="font-mono" fill="#f1fa8c" font-size="11">JS</text>
  <text x="38" y="120" class="font-ui" fill="#c8c8e0" font-size="12">app.js</text>

  <!-- Tab Bar -->
  <rect x="240" y="38" width="960" height="36" fill="#1a1a2e"/>
  <line x1="240" y1="74" x2="1200" y2="74" stroke="#2d2d50" stroke-width="1"/>
  <rect x="240" y="38" width="170" height="36" fill="#252540"/>
  <line x1="240" y1="74" x2="410" y2="74" stroke="#6c63ff" stroke-width="2"/>
  <text x="260" y="60" class="font-mono" fill="#ffb86c" font-size="10">¶</text>
  <text x="276" y="60" class="font-ui" fill="#c8c8e0" font-size="12">meeting-notes.md</text>

  <!-- Editor area -->
  <rect x="240" y="74" width="960" height="652" fill="#252540"/>
  <rect x="240" y="74" width="48" height="652" fill="#1e1e32" opacity="0.5"/>

  <!-- Line numbers -->
  <text x="278" y="98" class="font-mono" fill="#5e5e80" font-size="13" text-anchor="end">1</text>
  <text x="278" y="118" class="font-mono" fill="#5e5e80" font-size="13" text-anchor="end">2</text>
  <text x="278" y="138" class="font-mono" fill="#5e5e80" font-size="13" text-anchor="end">3</text>
  <text x="278" y="158" class="font-mono" fill="#5e5e80" font-size="13" text-anchor="end">4</text>
  <text x="278" y="178" class="font-mono" fill="#5e5e80" font-size="13" text-anchor="end">5</text>
  <text x="278" y="198" class="font-mono" fill="#5e5e80" font-size="13" text-anchor="end">6</text>
  <text x="278" y="218" class="font-mono" fill="#5e5e80" font-size="13" text-anchor="end">7</text>
  <text x="278" y="238" class="font-mono" fill="#5e5e80" font-size="13" text-anchor="end">8</text>
  <text x="278" y="258" class="font-mono" fill="#5e5e80" font-size="13" text-anchor="end">9</text>
  <text x="278" y="278" class="font-mono" fill="#5e5e80" font-size="13" text-anchor="end">10</text>
  <text x="278" y="298" class="font-mono" fill="#5e5e80" font-size="13" text-anchor="end">11</text>
  <text x="278" y="318" class="font-mono" fill="#5e5e80" font-size="13" text-anchor="end">12</text>

  <!-- Content -->
  <text x="296" y="98" class="font-mono" fill="#c8c8e0" font-size="13">────────────────────────────────────</text>
  <text x="296" y="118" class="font-mono" fill="#ffb86c" font-size="13">2026/03/28 定例ミーティング</text>
  <text x="296" y="138" class="font-mono" fill="#c8c8e0" font-size="13">────────────────────────────────────</text>
  <text x="296" y="178" class="font-mono" fill="#8888aa" font-size="13">## 参加者</text>
  <text x="296" y="198" class="font-mono" fill="#c8c8e0" font-size="13">- 田中、佐藤、鈴木</text>
  <text x="296" y="238" class="font-mono" fill="#8888aa" font-size="13">## 議題</text>
  <text x="296" y="258" class="font-mono" fill="#c8c8e0" font-size="13">- 新規プロジェクトの進捗報告</text>
  <text x="296" y="278" class="font-mono" fill="#c8c8e0" font-size="13">- Q2の開発ロードマップ確認</text>

  <!-- Voice interim transcript (the key feature) -->
  <text x="296" y="318" class="font-mono" fill="#c8c8e0" font-size="13">- リリーススケジュールの調整が必要です</text>
  <!-- Interim text shown in different style -->
  <rect x="290" y="326" width="440" height="22" rx="4" fill="#6c63ff" opacity="0.08"/>
  <text x="296" y="342" class="font-mono" fill="#6c63ff" font-size="13" opacity="0.6">来週までにテスト計画を...</text>
  <!-- Cursor blinking -->
  <rect x="496" y="330" width="2" height="16" fill="#6c63ff" opacity="0.8"/>

  <!-- Mic button (active/recording) -->
  <circle cx="1170" cy="710" r="18" fill="#ff5555" opacity="0.2" filter="url(#glow)"/>
  <circle cx="1170" cy="710" r="14" fill="#ff5555" opacity="0.3"/>
  <text x="1170" y="716" class="font-ui" fill="#ffffff" font-size="16" text-anchor="middle">🎤</text>

  <!-- Status Bar -->
  <rect x="0" y="726" width="1200" height="24" fill="#1a1a2e"/>
  <line x1="0" y1="726" x2="1200" y2="726" stroke="#2d2d50" stroke-width="1"/>

  <!-- Recording indicator -->
  <circle cx="20" cy="738" r="4" fill="#ff5555"/>
  <text x="30" y="742" class="font-ui" fill="#ff5555" font-size="11">Recording...</text>

  <text x="1000" y="742" class="font-ui" fill="#8888aa" font-size="11">Ln 12, Col 15</text>
  <text x="1068" y="742" class="font-ui" fill="#8888aa" font-size="11">UTF-8</text>
  <text x="1120" y="742" class="font-ui" fill="#8888aa" font-size="11">Markdown</text>

  <!-- Window border -->
  <rect width="1200" height="750" rx="10" fill="none" stroke="#2d2d50" stroke-width="1"/>
</svg>